name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-mock
        # Simula o Layer do Strands e Boto3 no ambiente de CI para os testes passarem
        pip install strands boto3

    - name: Check syntax
      run: |
        python -m py_compile src/lambda_analisar/lambda_function.py
        python -m py_compile src/lambda_consultar/lambda_function.py

    - name: Run Tests
      run: |
        pytest tests/
